<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        /* ========== 主题变量 ========== */
        :root {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --card-bg: #2c2c2e;
            --input-bg: #3a3a3c;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8ed;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(0, 0, 0, 0.05);
            --card-bg: #ffffff;
            --input-bg: #f5f5f7;
        }

        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            font-size: 17px;
            transition: background 0.3s, color 0.3s;
        }

        /* ========== 左侧导航栏 ========== */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease, width 0.3s ease, background 0.3s;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar.collapsed {
            transform: translateX(-280px);
        }

        .sidebar-header {
            padding: 20px;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .sidebar-toggle:hover {
            background: var(--bg-tertiary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--hover-bg);
            border-radius: 3px;
        }

        /* ========== 文件夹树 ========== */
        .tree-item {
            margin-bottom: 2px;
        }

        .folder-item {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .folder-item:hover {
            background: var(--hover-bg);
        }

        .folder-item.active {
            background: #007aff;
            color: white;
        }

        .folder-item.active .folder-count {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .folder-item.active .folder-toggle {
            color: rgba(255, 255, 255, 0.7);
        }

        .folder-toggle {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .folder-toggle.expanded {
            transform: rotate(90deg);
        }

        .folder-toggle.hidden {
            visibility: hidden;
        }

        .folder-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .folder-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .folder-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
        }

        .folder-count {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--hover-bg);
            padding: 2px 7px;
            border-radius: 10px;
        }

        .folder-children {
            display: none;
            padding-left: 12px;
        }

        .folder-children.expanded {
            display: block;
        }

        /* ========== 主区域 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
        }

        .main.expanded {
            margin-left: 0;
        }

        .expand-btn {
            position: fixed;
            left: 16px;
            top: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            box-shadow: 0 2px 8px var(--shadow-color);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-secondary);
            z-index: 99;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: var(--bg-tertiary);
        }

        .expand-btn.visible {
            display: flex;
        }

        /* ========== 图片容器 ========== */
        .image-container {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 40px;
            background: var(--bg-primary);
            position: relative;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .image-container.centered {
            justify-content: center;
            align-items: center;
        }

        #currentImage {
            max-width: calc(100vw - 360px);
            max-height: calc(100vh - 100px);
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px var(--shadow-color);
            transition: opacity 0.3s ease;
        }

        .main.expanded #currentImage {
            max-width: calc(100vw - 80px);
        }

        /* ========== 图片信息悬浮层 ========== */
        .image-overlay {
            position: fixed;
            left: 296px;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 50;
            transition: left 0.3s ease;
            max-width: 400px;
        }

        .main.expanded .image-overlay {
            left: 20px;
        }

        .image-overlay .image-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
        }

        .image-overlay .image-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ========== 右侧操作栏 ========== */
        .action-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }

        .action-panel-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            box-shadow: 0 2px 8px var(--shadow-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .action-panel-toggle:hover {
            background: var(--bg-tertiary);
        }

        .action-panel-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 16px var(--shadow-color);
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 160px;
            transition: background 0.3s;
        }

        .action-panel-content.visible {
            display: flex;
        }

        .action-panel-content label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }

        .action-panel-content input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #007aff;
        }

        .action-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: var(--input-bg);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: left;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
        }

        .action-btn.primary {
            background: #007aff;
            color: white;
        }

        .action-btn.primary:hover {
            background: #0062cc;
        }

        /* ========== 文件夹网格 ========== */
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            padding: 30px;
            width: 100%;
            align-content: start;
        }

        .folder-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .folder-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px var(--shadow-color);
        }

        .folder-card-preview {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .folder-card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .folder-card-preview .placeholder {
            font-size: 48px;
        }

        .folder-card-info {
            padding: 16px;
        }

        .folder-card-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-card-count {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ========== 状态提示 ========== */
        .loading {
            opacity: 0.6;
        }

        .no-images {
            text-align: center;
            color: var(--text-secondary);
        }

        .no-images h3 {
            font-size: 22px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: background 0.3s;
        }

        .loading-screen p {
            color: var(--text-secondary);
            font-size: 17px;
        }

        .error-message {
            color: #ff3b30;
            padding: 30px;
            text-align: center;
        }

        /* ========== 全屏模式 ========== */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .fullscreen-overlay.visible {
            display: flex;
        }

        .fullscreen-overlay img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .fullscreen-info {
            display: none;
        }

        /* ========== 视频播放 ========== */
        .video-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-progress {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .video-progress:hover {
            opacity: 1;
        }

        .video-progress-bar {
            height: 100%;
            background: #007aff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .video-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            width: 100%;
        }

        .video-mute-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-mute-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .video-mute-btn.muted::before {
            content: "🔇";
        }

        .video-mute-btn.unmuted::before {
            content: "🔊";
        }
    </style>
</head>
<body>
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen" style="display: none;">
        <p>正在加载...</p>
    </div>

    <!-- 展开按钮 -->
    <button class="expand-btn" id="expandBtn" onclick="toggleSidebar()">☰</button>

    <!-- 左侧导航 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>相册</span>
            <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
        </div>
        <div class="sidebar-content" id="folderList"></div>
    </div>

    <!-- 主区域 -->
    <div class="main" id="main">
        <div class="image-container" id="imageContainer">
            <div class="folder-grid">
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/58/', '58', '0')">
                    <div class="folder-card-preview" id="preview-0">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">58</div>
                        <div class="folder-card-count" id="count-0">加载中...</div>
                    </div>
                </div>
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/allinone/', 'allinone', '1')">
                    <div class="folder-card-preview" id="preview-1">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">allinone</div>
                        <div class="folder-card-count" id="count-1">加载中...</div>
                    </div>
                </div>
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/hot/', 'hot', '2')">
                    <div class="folder-card-preview" id="preview-2">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">hot</div>
                        <div class="folder-card-count" id="count-2">加载中...</div>
                    </div>
                </div>
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/meituan/', 'meituan', '3')">
                    <div class="folder-card-preview" id="preview-3">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">meituan</div>
                        <div class="folder-card-count" id="count-3">加载中...</div>
                    </div>
                </div>
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/other/', 'other', '4')">
                    <div class="folder-card-preview" id="preview-4">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">other</div>
                        <div class="folder-card-count" id="count-4">加载中...</div>
                    </div>
                </div>
                <div class="folder-card" onclick="selectFolderItem('http://localhost:8080/vancl/', 'vancl', '5')">
                    <div class="folder-card-preview" id="preview-5">
                        <span class="placeholder">📁</span>
                    </div>
                    <div class="folder-card-info">
                        <div class="folder-card-name">vancl</div>
                        <div class="folder-card-count" id="count-5">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图片信息悬浮层 -->
        <div class="image-overlay" id="imageOverlay" style="display: none;">
            <div class="image-count">- / -</div>
            <div class="image-name">-</div>
        </div>

        <!-- 右侧操作栏 -->
        <div class="action-panel" id="actionPanel" style="display: none;">
            <button class="action-panel-toggle" onclick="toggleActionPanel()">⚙</button>
            <div class="action-panel-content" id="actionContent">
                <label>
                    <input type="checkbox" id="darkModeToggle" checked="">
                    暗黑模式
                </label>
                <label>
                    <input type="checkbox" id="excitingMode">
                    精彩模式
                </label>
                <label>
                    <input type="checkbox" id="shuffleMode" checked>
                    随机排序
                </label>
            </div>
        </div>
    </div>

    <!-- 全屏模式 -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <img id="fullscreenImage" src="" alt="">
        <div class="fullscreen-info" id="fullscreenInfo"></div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let folderTree = [];
        let images = [];
        let allImages = [];
        let currentIndex = 0;
        let currentFolder = null;
        let isExcitingMode = false;
        let isShuffleMode = true;
        let isDarkMode = true;
        let isFullscreen = false;
        let baseUrl = '';
        let failedCount = 0;

        // ========== 主题管理 ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('gallery_theme');
            isDarkMode = savedTheme !== 'light';
            applyTheme();
            document.getElementById('darkModeToggle').checked = isDarkMode;
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('gallery_theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        // ========== UI 控制函数 ==========
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main');
            const expandBtn = document.getElementById('expandBtn');
            sidebar.classList.toggle('collapsed');
            main.classList.toggle('expanded');
            expandBtn.classList.toggle('visible', sidebar.classList.contains('collapsed'));
        }

        function toggleActionPanel() {
            document.getElementById('actionContent').classList.toggle('visible');
        }

        // ========== 文件夹加载 ==========
        async function loadFolders() {
            try {
                const currentUrl = window.location.href;
                let path = currentUrl;
                if (path.includes('/viewer.html')) {
                    path = path.substring(0, path.lastIndexOf('/viewer.html') + 1);
                } else {
                    path = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
                }
                baseUrl = path;

                const response = await fetch(baseUrl);
                const html = await response.text();
                const { images: currentDirImages, folders } = extractItems(html, baseUrl);

                folderTree = folders.map(f => ({
                    name: f.name,
                    url: f.url,
                    children: null,
                    loaded: false,
                    previewImage: null,
                    imageCount: 0
                }));

                if (currentDirImages.length > 0) {
                    folderTree.unshift({
                        name: '当前目录',
                        url: '',
                        images: currentDirImages,
                        isCurrent: true,
                        loaded: true,
                        previewImage: currentDirImages[0].url,
                        imageCount: currentDirImages.length
                    });
                }

                if (folderTree.length > 0) {
                    renderFolderTree();
                    renderInitialFolders();
                    document.getElementById('loadingScreen').style.display = 'none';
                } else {
                    document.getElementById('loadingScreen').innerHTML = '<div class="error-message"><h3>未找到图片</h3></div>';
                }
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('loadingScreen').innerHTML = '<div class="error-message"><h3>加载失败</h3><p>请使用 HTTP 服务器访问</p></div>';
            }
        }

        // ========== 文件夹树渲染 ==========
        function renderFolderTree() {
            document.getElementById('folderList').innerHTML = renderTreeItems(folderTree, '', true);
        }

        function renderTreeItems(items, parentPath, isRoot = false) {
            return items.map((item, index) => {
                const path = parentPath ? `${parentPath}/${index}` : `${index}`;
                const hasChildren = item.children !== null && item.children !== undefined && item.children.length > 0;
                const isExpanded = item.expanded ? 'expanded' : '';
                const hasSubfolders = item.hasSubfolders;
                const showToggle = hasChildren || hasSubfolders || !item.loaded;

                return `
                    <div class="tree-item" data-path="${path}">
                        <div class="folder-item ${item.active ? 'active' : ''}" onclick="selectFolderItem('${item.url}', '${item.name}', '${path}')">
                            <span class="folder-toggle ${isExpanded} ${!showToggle ? 'hidden' : ''}"
                                  onclick="event.stopPropagation(); toggleFolder('${path}')">▶</span>
                            <div class="folder-icon">
                                ${item.previewImage ?
                                    `<img src="${item.previewImage}" onerror="this.parentElement.innerHTML='📁'">` :
                                    (item.isCurrent ? '📷' : '📁')}
                            </div>
                            <span class="folder-name">${item.name}</span>
                            ${item.imageCount ? `<span class="folder-count">${item.imageCount}</span>` : ''}
                        </div>
                        ${hasChildren ? `<div class="folder-children ${isExpanded}">${renderTreeItems(item.children, path)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function renderInitialFolders() {
            const container = document.getElementById('imageContainer');
            container.classList.remove('centered');

            const hasCurrentDir = folderTree.length > 0 && folderTree[0].isCurrent;
            const folders = hasCurrentDir ? folderTree.slice(1) : folderTree;

            if (folders.length === 0) {
                container.innerHTML = '<div class="no-images"><h3>没有找到相册</h3></div>';
                return;
            }

            container.innerHTML = `
                <div class="folder-grid">
                    ${folders.map((f, i) => `
                        <div class="folder-card" onclick="selectFolderItem('${f.url}', '${f.name}', '${hasCurrentDir ? i + 1 : i}')">
                            <div class="folder-card-preview" id="preview-${hasCurrentDir ? i + 1 : i}">
                                <span class="placeholder">📁</span>
                            </div>
                            <div class="folder-card-info">
                                <div class="folder-card-name">${f.name}</div>
                                <div class="folder-card-count" id="count-${hasCurrentDir ? i + 1 : i}">加载中...</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            folders.forEach((f, i) => loadFolderPreview(f, hasCurrentDir ? i + 1 : i));
        }

        async function loadFolderPreview(folder, index) {
            try {
                const response = await fetch(folder.url);
                const html = await response.text();
                const { images: foundImages, folders: subFolders } = extractItems(html, folder.url);

                folder.hasSubfolders = subFolders && subFolders.length > 0;

                if (foundImages.length > 0) {
                    updateFolderPreview(index, foundImages[0].url, foundImages.length);
                    folder.previewImage = foundImages[0].url;
                    folder.imageCount = foundImages.length;
                    renderFolderTree();
                }
            } catch (e) {
                console.error('加载预览失败:', folder.name);
            }
        }

        function updateFolderPreview(index, imgUrl, count) {
            const previewEl = document.getElementById(`preview-${index}`);
            const countEl = document.getElementById(`count-${index}`);
            if (previewEl) {
                previewEl.innerHTML = `<img src="${imgUrl}" onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>📁</span>'">`;
            }
            if (countEl) {
                countEl.textContent = `${count} 张图片`;
            }
        }

        // ========== 文件夹树操作 ==========
        async function toggleFolder(path) {
            const item = getTreeItemByPath(path);
            if (!item || item.isCurrent) return;

            if (!item.loaded) {
                await loadSubFolders(item, path);
                item.expanded = true;
                renderFolderTree();
            } else {
                item.expanded = !item.expanded;
                renderFolderTree();
            }
        }

        async function loadSubFolders(item, path) {
            try {
                const response = await fetch(item.url);
                const html = await response.text();
                const { folders: subFolders } = extractItems(html, item.url);

                item.children = subFolders.map(f => ({
                    name: f.name,
                    url: f.url,
                    children: null,
                    loaded: false,
                    previewImage: null,
                    imageCount: 0,
                    hasSubfolders: false
                }));
                item.loaded = true;

                renderFolderTree();

                await Promise.all(item.children.map(async (child) => {
                    await loadSubFolderPreviewFast(child);
                }));

                renderFolderTree();

            } catch (e) {
                item.children = [];
                item.loaded = true;
            }
        }

        async function loadSubFolderPreviewFast(folder) {
            try {
                const response = await fetch(folder.url);
                const html = await response.text();
                const { images: foundImages, folders: foundFolders } = extractItems(html, folder.url);

                const hasSubfolders = foundFolders && foundFolders.length > 0;

                if (foundImages.length > 0) {
                    folder.previewImage = foundImages[0].url;
                    folder.imageCount = foundImages.length;
                }
                folder.hasSubfolders = hasSubfolders;

                renderFolderTree();
            } catch (e) {}
        }

        function getTreeItemByPath(path) {
            const indices = path.split('/').map(Number);
            let current = folderTree;
            for (let i = 0; i < indices.length; i++) {
                if (i === indices.length - 1) return current[indices[i]];
                current = current[indices[i]]?.children;
                if (!current) return null;
            }
            return null;
        }

        function findFolderInTree(url, items = folderTree, path = '') {
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const currentPath = path ? `${path}/${i}` : `${i}`;

                if (item.url === url) {
                    return currentPath;
                }

                if (item.children && item.children.length > 0) {
                    const found = findFolderInTree(url, item.children, currentPath);
                    if (found) return found;
                }
            }
            return null;
        }

        function expandPathToFolder(path) {
            const indices = path.split('/').map(Number);
            let current = folderTree;

            for (let i = 0; i < indices.length - 1; i++) {
                const item = current[indices[i]];
                if (item) {
                    item.expanded = true;
                    current = item.children;
                }
            }
        }

        function clearActive(item) {
            item.active = false;
            if (item.children) item.children.forEach(clearActive);
        }

        // ========== 文件夹选择 ==========
        async function selectFolderItem(url, name, path) {
            console.log(`📁 点击文件夹: ${name}, URL: ${url}`);
            const startTime = performance.now();

            folderTree.forEach(clearActive);
            const item = getTreeItemByPath(path);
            if (item) item.active = true;
            renderFolderTree();

            currentFolder = name;
            document.getElementById('actionPanel').style.display = 'none';

            if (item.isCurrent && item.images) {
                console.log(`✅ 当前目录，直接使用内存中的 ${item.images.length} 张图片`);
                images = item.images.map((img, i) => ({ ...img, originalIndex: i + 1 }));
                allImages = [...images];
                shuffleImages();
                return;
            }

            document.getElementById('imageContainer').innerHTML = '<p style="color: #86868b;">加载中...</p>';
            await loadAndDisplayFolder(url, name);
            console.log(`⏱️ 总耗时: ${(performance.now() - startTime).toFixed(2)}ms`);
        }

        // ========== 内容解析 ==========
        function extractItems(html, url) {
            const images = [];
            const folders = [];
            const linkRegex = /<a[^>]+href=["']([^"']+)["'][^>]*>/gi;
            let match;

            while ((match = linkRegex.exec(html)) !== null) {
                const href = match[1];
                if (!href) continue;

                if (href === '../' || href === './') continue;

                let fullUrl;
                if (href.startsWith('http')) {
                    fullUrl = href;
                } else if (href.startsWith('/')) {
                    fullUrl = baseUrl + href.substring(1);
                } else {
                    fullUrl = url + href;
                }

                if (href.endsWith('/')) {
                    folders.push({ name: decodeURIComponent(href.replace(/\/$/, '').split('/').pop()), url: fullUrl });
                } else if (/\.(jpg|jpeg|png|gif|webp|bmp|mp4)$/i.test(href) && !href.startsWith('._')) {
                    images.push({ name: decodeURIComponent(href), url: fullUrl });
                }
            }
            return { images, folders };
        }

        // ========== 文件夹内容显示 ==========
        function displayFolderContent(imgs, folders, name, url) {
            if (imgs && imgs.length > 0) {
                images = imgs.map((img, i) => ({ ...img, originalIndex: i + 1 }));
                allImages = [...images];
                shuffleImages();
            } else if (folders && folders.length > 0) {
                renderSubFolders(folders, name, url);
            } else {
                document.getElementById('imageContainer').innerHTML = '<div class="no-images"><h3>目录为空</h3></div>';
            }
        }

        async function loadAndDisplayFolder(url, name) {
            console.log(`🌐 加载文件夹: ${name}`);

            const networkStart = performance.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            try {
                console.log(`📡 请求URL: ${url}`);
                const response = await fetch(url, { signal: controller.signal });
                console.log(`⬇️ 响应状态: ${response.status}, 耗时: ${(performance.now() - networkStart).toFixed(2)}ms`);

                clearTimeout(timeoutId);

                const html = await response.text();
                console.log(`📄 HTML文本获取: ${html.length} 字符`);

                const { images: foundImages, folders: foundFolders } = extractItems(html, url);
                console.log(`🔍 解析完成: 图片=${foundImages.length}, 文件夹=${foundFolders.length}`);

                displayFolderContent(foundImages, foundFolders, name, url);

                console.log(`✅ 网络请求总耗时: ${(performance.now() - networkStart).toFixed(2)}ms`);
            } catch (e) {
                clearTimeout(timeoutId);
                console.error('❌ 加载失败:', e);
                document.getElementById('imageContainer').innerHTML =
                    '<div class="no-images"><h3>加载失败</h3><p>' + (e.name === 'AbortError' ? '请求超时' : e.message) + '</p></div>';
            }
        }

        function renderSubFolders(subFolders, parentName, parentUrl) {
            const container = document.getElementById('imageContainer');
            container.classList.remove('centered');

            const subFolderIds = subFolders.map((f, i) => `subfolder_${Date.now()}_${i}`);

            subFolders.forEach((f, i) => {
                loadSubFolderCardPreview(f, subFolderIds[i]);
            });

            const escapeUrl = url => url.replace(/'/g, "\\'");

            container.innerHTML = `
                <div class="folder-grid">
                    ${subFolders.map((f, i) => `
                        <div class="folder-card" onclick="selectSubFolder('${escapeUrl(f.url)}', '${f.name}', '${escapeUrl(parentUrl)}')">
                            <div class="folder-card-preview" id="${subFolderIds[i]}">
                                <span class="placeholder">📁</span>
                            </div>
                            <div class="folder-card-info">
                                <div class="folder-card-name">${f.name}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadSubFolderCardPreview(folder, elementId) {
            try {
                const response = await fetch(folder.url);
                const html = await response.text();
                const { images: foundImages } = extractItems(html, folder.url);

                if (foundImages.length > 0) {
                    updateSubFolderCardPreview(elementId, foundImages[0].url);
                }
            } catch (e) {}
        }

        function updateSubFolderCardPreview(elementId, imgUrl) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerHTML = `<img src="${imgUrl}" onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>📁</span>'">`;
            }
        }

        async function selectSubFolder(folderUrl, folderName, parentUrl) {
            folderTree.forEach(clearActive);

            let foundPath = findFolderInTree(folderUrl);

            if (!foundPath && parentUrl) {
                const parentPath = findFolderInTree(parentUrl);
                if (parentPath) {
                    const parentItem = getTreeItemByPath(parentPath);
                    if (parentItem && !parentItem.loaded) {
                        await loadSubFolders(parentItem, parentPath);
                    }
                    parentItem.expanded = true;
                    foundPath = findFolderInTree(folderUrl);
                }
            }

            if (foundPath) {
                expandPathToFolder(foundPath);
                const item = getTreeItemByPath(foundPath);
                if (item) item.active = true;
                renderFolderTree();
            }

            document.getElementById('imageContainer').innerHTML = '<p style="color: #86868b;">加载中...</p>';
            await loadAndDisplayFolder(folderUrl, folderName);
        }

        // ========== 图片显示 ==========
        function applyImageOrder() {
            // 获取当前图片URL，用于定位
            const currentImg = images[currentIndex];
            const currentUrl = currentImg ? currentImg.url : null;
            
            let ordered = isExcitingMode ? filterExciting(allImages) : [...allImages];
            
            if (isShuffleMode) {
                // 随机排序
                for (let i = ordered.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [ordered[i], ordered[j]] = [ordered[j], ordered[i]];
                }
            }
            // 非随机模式保持原始顺序
            
            images = ordered;
            
            // 尝试保持当前图片位置
            if (currentUrl) {
                const newIndex = images.findIndex(img => img.url === currentUrl);
                if (newIndex !== -1) {
                    currentIndex = newIndex;
                    showImage(currentIndex);
                    return;
                }
            }
            
            currentIndex = 0;
            showImage(0);
        }

        // 保留原函数名以兼容
        function shuffleImages() {
            applyImageOrder();
        }

        function filterExciting(imgs) {
            return imgs.filter(img => /nude|bikini|remove/i.test(img.name));
        }

        function showImage(index, skipFailed = false) {
            const container = document.getElementById('imageContainer');

            if (images.length === 0) {
                container.innerHTML = '<div class="no-images"><h3>没有图片</h3></div>';
                container.classList.remove('centered');
                document.getElementById('imageOverlay').style.display = 'none';
                return;
            }

            currentIndex = (index + images.length) % images.length;
            const img = images[currentIndex];

            const displayName = img.name.replace(/\.[^.]+$/, '');
            const isVideo = /\.mp4$/i.test(img.name);

            container.classList.add('centered');

            if (isVideo) {
                container.innerHTML = `
                    <div class="video-wrapper">
                        <video id="currentVideo" src="${img.url}" autoplay muted loop playsinline
                               style="max-width: calc(100vw - 360px); max-height: calc(100vh - 150px); border-radius: 12px; box-shadow: 0 20px 60px var(--shadow-color);">
                        </video>
                        <div class="video-controls">
                            <button class="video-mute-btn muted" id="videoMuteBtn">静音</button>
                            <div class="video-progress" style="flex: 1;">
                                <div class="video-progress-bar" id="videoProgressBar"></div>
                            </div>
                        </div>
                    </div>
                `;

                const videoEl = document.getElementById('currentVideo');
                const progressBar = document.getElementById('videoProgressBar');
                const muteBtn = document.getElementById('videoMuteBtn');

                videoEl.onloadeddata = () => {
                    failedCount = 0;
                };

                videoEl.onerror = () => {
                    failedCount++;
                    if (!skipFailed && failedCount < images.length) {
                        setTimeout(() => showImage(currentIndex + 1, true), 500);
                    }
                };

                videoEl.addEventListener('timeupdate', function() {
                    if (videoEl.duration) {
                        const progress = (videoEl.currentTime / videoEl.duration) * 100;
                        progressBar.style.width = progress + '%';
                    }
                });

                videoEl.addEventListener('ended', function() {
                    progressBar.style.width = '0%';
                });

                muteBtn.addEventListener('click', function() {
                    videoEl.muted = !videoEl.muted;
                    if (videoEl.muted) {
                        muteBtn.classList.remove('unmuted');
                        muteBtn.classList.add('muted');
                        muteBtn.textContent = '静音';
                    } else {
                        muteBtn.classList.remove('muted');
                        muteBtn.classList.add('unmuted');
                        muteBtn.textContent = '有声';
                    }
                });

                videoEl.addEventListener('dblclick', function() {
                    enterFullscreen(img.url, displayName, img.originalIndex);
                });
            } else {
                container.innerHTML = `<img id="currentImage" src="${img.url}" alt="" class="loading">`;

                const imageEl = document.getElementById('currentImage');

                imageEl.onload = () => {
                    imageEl.classList.remove('loading');
                    failedCount = 0;
                };

                imageEl.onerror = () => {
                    imageEl.classList.remove('loading');
                    failedCount++;
                    if (!skipFailed && failedCount < images.length) {
                        setTimeout(() => showImage(currentIndex + 1, true), 500);
                    }
                };

                imageEl.addEventListener('dblclick', function() {
                    enterFullscreen(img.url, displayName, img.originalIndex);
                });
            }

            const overlay = document.getElementById('imageOverlay');
            overlay.style.display = 'block';
            overlay.innerHTML = `
                <div class="image-count">${img.originalIndex} / ${images.length}</div>
                <div class="image-name">${displayName}</div>
            `;

            document.getElementById('actionPanel').style.display = 'flex';
        }

        // ========== 全屏模式辅助函数 ==========
        function restoreFullscreenOverlay() {
            const overlay = document.getElementById('fullscreenOverlay');
            overlay.innerHTML = `
                <img id="fullscreenImage" src="" alt="">
                <div class="fullscreen-info" id="fullscreenInfo"></div>
            `;
        }

        function getBrowserFullscreenElement() {
            return document.fullscreenElement ||
                   document.webkitFullscreenElement ||
                   document.mozFullScreenElement ||
                   document.msFullscreenElement;
        }

        async function requestBrowserFullscreen(element) {
            try {
                if (element.requestFullscreen) {
                    await element.requestFullscreen();
                } else if (element.webkitRequestFullscreen) {
                    await element.webkitRequestFullscreen();
                } else if (element.mozRequestFullScreen) {
                    await element.mozRequestFullScreen();
                } else if (element.msRequestFullscreen) {
                    await element.msRequestFullscreen();
                }
            } catch (e) {
                console.log('无法进入全屏:', e);
            }
        }

        async function exitBrowserFullscreen() {
            try {
                if (document.exitFullscreen) {
                    await document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    await document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    await document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    await document.msExitFullscreen();
                }
            } catch (e) {
                console.log('无法退出全屏:', e);
            }
        }

        // ========== 全屏模式 ==========
        async function enterFullscreen(imgUrl, displayName, index) {
            const overlay = document.getElementById('fullscreenOverlay');
            const isVideo = /\.mp4$/i.test(imgUrl);

            if (isVideo) {
                overlay.innerHTML = `
                    <video id="fullscreenVideo" src="${imgUrl}" autoplay muted loop playsinline
                           style="max-width: 100vw; max-height: 100vh; object-fit: contain;">
                    </video>
                `;
            } else {
                overlay.innerHTML = `<img id="fullscreenImage" src="${imgUrl}" alt="" style="max-width: 100vw; max-height: 100vh; object-fit: contain;">`;
            }

            overlay.classList.add('visible');
            isFullscreen = true;

            await requestBrowserFullscreen(overlay);
        }

        async function exitFullscreen() {
            if (!isFullscreen) return;
            const overlay = document.getElementById('fullscreenOverlay');
            overlay.classList.remove('visible');
            isFullscreen = false;

            restoreFullscreenOverlay();
            await exitBrowserFullscreen();
        }

        function onFullscreenChange() {
            if (!getBrowserFullscreenElement() && isFullscreen) {
                const overlay = document.getElementById('fullscreenOverlay');
                overlay.classList.remove('visible');
                isFullscreen = false;
                restoreFullscreenOverlay();
            }
        }

        function updateFullscreenImage() {
            if (!isFullscreen || images.length === 0) return;

            const img = images[currentIndex];
            const overlay = document.getElementById('fullscreenOverlay');
            const isVideo = /\.mp4$/i.test(img.name);

            if (isVideo) {
                overlay.innerHTML = `
                    <video id="fullscreenVideo" src="${img.url}" autoplay muted loop playsinline
                           style="max-width: 100vw; max-height: 100vh; object-fit: contain;">
                    </video>
                `;
            } else {
                overlay.innerHTML = `<img id="fullscreenImage" src="${img.url}" alt="" style="max-width: 100vw; max-height: 100vh; object-fit: contain;">`;
            }
        }

        // ========== 事件监听 ==========
        document.getElementById('excitingMode').addEventListener('change', function(e) {
            isExcitingMode = e.target.checked;
            if (allImages.length > 0) applyImageOrder();
        });

        document.getElementById('shuffleMode').addEventListener('change', function(e) {
            isShuffleMode = e.target.checked;
            if (allImages.length > 0) applyImageOrder();
        });

        document.getElementById('darkModeToggle').addEventListener('change', function(e) {
            isDarkMode = e.target.checked;
            localStorage.setItem('gallery_theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        });

        document.getElementById('fullscreenOverlay').addEventListener('dblclick', exitFullscreen);

        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isFullscreen) {
                exitFullscreen();
                return;
            }

            if (images.length === 0) return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                failedCount = 0;
                showImage(currentIndex - 1);
                if (isFullscreen) {
                    updateFullscreenImage();
                }
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                failedCount = 0;
                showImage(currentIndex + 1);
                if (isFullscreen) {
                    updateFullscreenImage();
                }
            }
        });

        // ========== 初始化 ==========
        initTheme();
        loadFolders();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>58 Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .controls {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px 0 0 10px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        
        .controls.collapsed {
            transform: translateY(-50%) translateX(calc(100% - 30px));
        }
        
        .controls-toggle {
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            width: 30px;
            height: 60px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .controls-inner {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 160px;
        }
        
        .controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        
        .controls input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .controls button {
            background: #4a9eff;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
            white-space: nowrap;
        }
        
        .controls button:hover {
            background: #3a8eef;
        }
        
        .image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
        }
        
        #currentImage {
            max-width: 98vw;
            max-height: 96vh;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 13px;
            backdrop-filter: blur(10px);
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .info:hover {
            opacity: 1;
        }
        
        .config-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            z-index: 200;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        
        .config-panel h2 {
            margin-bottom: 20px;
            color: #4a9eff;
        }
        
        .config-panel p {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccc;
        }
        
        .config-panel .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .config-panel button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4a9eff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8eef;
        }
        
        .btn-secondary {
            background: #555;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #666;
        }
        
        .loading {
            opacity: 0.5;
        }
        
        .no-images {
            text-align: center;
            color: #888;
        }
        
        .no-images h3 {
            margin-bottom: 10px;
            color: #fff;
        }
        
        .shortcuts {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="config-panel" id="configPanel">
        <h2>📷 图片浏览器</h2>
        <div class="btn-group">
            <button class="btn-primary" onclick="loadFromDirectory()">📂 选择图片文件夹</button>
        </div>
        <p class="shortcuts">← → 或 ↑ ↓ 键切换图片</p>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button class="controls-toggle" onclick="toggleControls()">☰</button>
        <div class="controls-inner">
            <label>
                <input type="checkbox" id="excitingMode"> 
                🌟 精彩模式
            </label>
            <button onclick="shuffleImages()">🔀 随机排序</button>
            <button onclick="showConfig()">⚙ 设置</button>
        </div>
    </div>

    <div class="image-container" id="imageContainer" style="display: none;">
        <img id="currentImage" src="" alt="">
    </div>

    <div class="info" id="info" style="display: none;">
        <span id="imageInfo"></span>
    </div>

    <input type="file" id="directoryPicker" webkitdirectory multiple style="display: none;">

    <script>
        let images = [];
        let allImages = [];
        let currentIndex = 0;
        let isExcitingMode = false;

        function loadFromDirectory() {
            const picker = document.getElementById('directoryPicker');
            // 重置 input 以允许重新选择相同目录
            picker.value = '';
            picker.click();
        }
        
        // 目录选择事件
        document.getElementById('directoryPicker').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            // 过滤图片文件，排除系统文件和缩略图
            const imageFiles = files.filter(f => {
                const name = f.name.toLowerCase();
                return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(name) 
                    && !name.startsWith('.')
                    && name !== 'thumbs.db';
            });
            
            if (imageFiles.length > 0) {
                images = imageFiles.map(f => ({
                    name: f.name,
                    url: URL.createObjectURL(f)
                }));
                allImages = [...images];
                console.log(`已加载 ${images.length} 张图片`);
                startGallery();
            } else {
                alert('未找到图片文件！');
            }
        });

        function startGallery() {
            document.getElementById('configPanel').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('imageContainer').style.display = 'flex';
            document.getElementById('info').style.display = 'block';
            
            shuffleImages();
            showImage(0);
        }

        function shuffleImages() {
            const toShuffle = isExcitingMode ? filterExciting(allImages) : [...allImages];
            for (let i = toShuffle.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [toShuffle[i], toShuffle[j]] = [toShuffle[j], toShuffle[i]];
            }
            images = toShuffle;
            currentIndex = 0;
            showImage(0);
        }

        function filterExciting(imgs) {
            return imgs.filter(img => 
                /nude|bikini/i.test(img.name)
            );
        }

        let failedCount = 0;

        function showImage(index, skipFailed = false) {
            if (images.length === 0) {
                document.getElementById('imageContainer').innerHTML = 
                    '<div class="no-images"><h3>没有找到图片</h3><p>请检查文件列表或切换精彩模式</p></div>';
                return;
            }

            currentIndex = (index + images.length) % images.length;
            const img = images[currentIndex];
            
            const imageEl = document.getElementById('currentImage');
            imageEl.classList.add('loading');
            imageEl.src = img.url;
            imageEl.style.display = 'block';
            
            imageEl.onload = () => {
                imageEl.classList.remove('loading');
                failedCount = 0;
            };
            
            imageEl.onerror = () => {
                imageEl.classList.remove('loading');
                console.error('加载失败:', img.name, img.url);
                
                // 显示错误信息
                document.getElementById('imageInfo').innerHTML = 
                    `<span style="color: #ff6b6b;">⚠ 加载失败: ${img.name}</span> <span style="color: #888;">(自动跳过中...)</span>`;
                
                // 自动跳过失败的图片
                if (skipFailed) return;
                
                failedCount++;
                if (failedCount < images.length) {
                    // 避免无限循环，最多跳过图片总数的次数
                    setTimeout(() => showImage(currentIndex + 1, true), 500);
                } else {
                    document.getElementById('imageInfo').innerHTML = 
                        '<span style="color: #ff6b6b;">⚠ 多张图片加载失败，请检查文件格式</span>';
                }
            };

            document.getElementById('imageInfo').textContent = 
                `${currentIndex + 1} / ${images.length} - ${img.name}`;
        }

        function showConfig() {
            document.getElementById('configPanel').style.display = 'block';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('imageContainer').style.display = 'none';
            document.getElementById('info').style.display = 'none';
        }

        function toggleControls() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('collapsed');
        }

        // 精彩模式切换
        document.getElementById('excitingMode').addEventListener('change', function(e) {
            isExcitingMode = e.target.checked;
            shuffleImages();
        });

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('configPanel').style.display !== 'none') return;

            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                failedCount = 0;
                showImage(currentIndex - 1);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                failedCount = 0;
                showImage(currentIndex + 1);
            }
        });

        // 图片预加载
        function preloadImages() {
            const nextIndex = (currentIndex + 1) % images.length;
            const prevIndex = (currentIndex - 1 + images.length) % images.length;
            
            [nextIndex, prevIndex].forEach(idx => {
                const img = new Image();
                img.src = images[idx].url;
            });
        }
    </script>
</body>
</html>

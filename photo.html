<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px 0 0 10px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .controls.collapsed {
            transform: translateY(-50%) translateX(calc(100% - 30px));
        }

        .controls-toggle {
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            width: 30px;
            height: 60px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .controls-inner {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 160px;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .controls input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .controls button {
            background: #4a9eff;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .controls button:hover {
            background: #3a8eef;
        }

        .image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        #currentImage {
            max-width: 98vw;
            max-height: 96vh;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 13px;
            backdrop-filter: blur(10px);
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .info:hover {
            opacity: 1;
        }

        .loading {
            opacity: 0.5;
        }

        .no-images {
            text-align: center;
            color: #888;
        }

        .no-images h3 {
            margin-bottom: 10px;
            color: #fff;
        }

        .shortcuts {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-screen p {
            color: #4a9eff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <p>🔄 正在加载图片列表...</p>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button class="controls-toggle" onclick="toggleControls()">☰</button>
        <div class="controls-inner">
            <label>
                <input type="checkbox" id="excitingMode">
                🌟 精彩模式
            </label>
            <button onclick="shuffleImages()">🔀 随机排序</button>
        </div>
    </div>

    <div class="image-container" id="imageContainer" style="display: none;">
        <img id="currentImage" src="" alt="">
    </div>

    <div class="info" id="info" style="display: none;">
        <span id="imageInfo"></span>
    </div>

    <script>
        let images = [];
        let allImages = [];
        let currentIndex = 0;
        let isExcitingMode = false;

        // 页面加载时自动获取图片列表
        async function loadImages() {
            try {
                const response = await fetch(window.location.href);
                const html = await response.text();

                // 解析 HTML 中的图片链接
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');

                const imageUrls = [];
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(href) && !href.startsWith('._')) {
                        imageUrls.push({
                            name: decodeURIComponent(href),
                            url: href
                        });
                    }
                });

                if (imageUrls.length > 0) {
                    images = imageUrls;
                    allImages = [...images];
                    console.log(`已加载 ${images.length} 张图片`);
                    startGallery();
                } else {
                    document.getElementById('loadingScreen').innerHTML =
                        '<div class="no-images"><h3>未找到图片</h3><p>当前目录没有图片文件</p><p class="shortcuts">← → 或 ↑ ↓ 键切换图片</p></div>';
                }
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('loadingScreen').innerHTML =
                    '<div class="no-images"><h3>加载失败</h3><p>' + e.message + '</p></div>';
            }
        }

        // 页面加载完成后自动执行
        loadImages();

        function startGallery() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('imageContainer').style.display = 'flex';
            document.getElementById('info').style.display = 'block';

            shuffleImages();
        }

        function shuffleImages() {
            const toShuffle = isExcitingMode ? filterExciting(allImages) : [...allImages];
            for (let i = toShuffle.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [toShuffle[i], toShuffle[j]] = [toShuffle[j], toShuffle[i]];
            }
            images = toShuffle;
            currentIndex = 0;
            showImage(0);
        }

        function filterExciting(imgs) {
            return imgs.filter(img =>
                /nude|bikini/i.test(img.name)
            );
        }

        let failedCount = 0;

        function showImage(index, skipFailed = false) {
            if (images.length === 0) {
                document.getElementById('imageContainer').innerHTML =
                    '<div class="no-images"><h3>没有找到图片</h3><p>请检查文件列表或切换精彩模式</p></div>';
                return;
            }

            currentIndex = (index + images.length) % images.length;
            const img = images[currentIndex];

            const imageEl = document.getElementById('currentImage');
            imageEl.classList.add('loading');
            imageEl.src = img.url;
            imageEl.style.display = 'block';

            imageEl.onload = () => {
                imageEl.classList.remove('loading');
                failedCount = 0;
            };

            imageEl.onerror = () => {
                imageEl.classList.remove('loading');
                console.error('加载失败:', img.name);

                document.getElementById('imageInfo').innerHTML =
                    `<span style="color: #ff6b6b;">⚠ 加载失败: ${img.name}</span> <span style="color: #888;">(自动跳过中...)</span>`;

                if (skipFailed) return;

                failedCount++;
                if (failedCount < images.length) {
                    setTimeout(() => showImage(currentIndex + 1, true), 500);
                } else {
                    document.getElementById('imageInfo').innerHTML =
                        '<span style="color: #ff6b6b;">⚠ 多张图片加载失败</span>';
                }
            };

            document.getElementById('imageInfo').textContent =
                `${currentIndex + 1} / ${images.length} - ${img.name}`;
        }

        function toggleControls() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('collapsed');
        }

        // 精彩模式切换
        document.getElementById('excitingMode').addEventListener('change', function(e) {
            isExcitingMode = e.target.checked;
            shuffleImages();
        });

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (images.length === 0) return;

            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                failedCount = 0;
                showImage(currentIndex - 1);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                failedCount = 0;
                showImage(currentIndex + 1);
            }
        });
    </script>
</body>
</html>
